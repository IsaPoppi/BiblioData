# Infra opcional para o caminho "de producao".
# O pipeline roda SEM Docker (fallback automatico). Suba isto para usar
# Kafka real (Redpanda) e/ou Metabase como alternativa ao Streamlit.
#
#   docker compose up -d
#   export STREAM_BACKEND=kafka
#   python pipeline.py

services:
  # Redpanda: broker compativel com Kafka, leve, sem Zookeeper, sem Java exposto.
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Metabase: alternativa de BI ao painel Streamlit (aponta para data/gold).
  metabase:
    image: metabase/metabase:v0.49.6
    ports:
      - "3000:3000"
    volumes:
      - ./data/gold:/data/gold:ro
    depends_on:
      - redpanda
